# yaml-language-server: $schema=../../schemas/redux-config.schema.json
name: blind_pdm_plksr_x4_satellite
scale: 4
num_gpu: auto
manual_seed: 42
use_amp: true
amp_bf16: false
use_channels_last: true
high_order_degradation: false
blind:
  method: pdm_sr

datasets:
  train:
    name: Satellite 0.5m to Aerial 0.125m Unpaired
    type: unpairedimagedataset
    dataroot_lq: [C:/Users/myg/Desktop/Unpaired_SR/dataset/lr]
    dataroot_ref: [C:/Users/myg/Desktop/Unpaired_SR/dataset/hr]
    lq_size: 64
    use_hflip: true
    use_rot: true
    num_worker_per_gpu: 8
    batch_size_per_gpu: 8
    accum_iter: 1

network_g:
  type: plksr
  scale: 4
  dim: 64
  n_blocks: 28
  kernel_size: 17

network_deg:
  type: pdmdegmodel
  scale: 4
  nc_img: 3
  kernel_opt:
    spatial: false
    mix: false
    nc: 3
    nf: 64
    nb: 8
    head_k: 1
    body_k: 1
    ksize: 21
    zero_init: true
  noise_opt:
    spatial: false
    mix: false
    nc: 3
    nf: 32
    nb: 8
    head_k: 3
    body_k: 3
    dim: 3
    zero_init: false

network_d_lr:
  type: pdmpatchgandiscriminator
  in_c: 3
  nf: 64
  nb: 3
  stride: 1

network_d_sr:
  type: pdmpatchgandiscriminator
  in_c: 3
  nf: 64
  nb: 3
  stride: 1

path:
  # 官方 PLKSR x4 预训练权重（DF2K），需先下载到 ../weight/
  # https://github.com/dslisleedh/PLKSR (Model Zoo: PLKSR_X4_DF2K.pth)
  pretrain_network_g: C:/Users/myg/Desktop/Unpaired_SR/weight/PLKSR_X4_DF2K.pth
  pretrain_network_deg: ~
  pretrain_network_d_lr: ~
  pretrain_network_d_sr: ~
  strict_load_g: false
  strict_load_deg: false
  strict_load_d_lr: false
  strict_load_d_sr: false
  resume_state: ~

train:
  total_iter: 200000
  warmup_iter: -1
  ema_decay: 0
  optim_g:
    type: Adam
    lr: !!float 1e-4
    weight_decay: 0
    betas: [0.9, 0.99]
  optim_deg:
    type: Adam
    lr: !!float 2e-4
    weight_decay: 0
    betas: [0.9, 0.99]
  optim_d_lr:
    type: Adam
    lr: !!float 2e-4
    weight_decay: 0
    betas: [0.9, 0.99]
  optim_d_sr:
    type: Adam
    lr: !!float 2e-4
    weight_decay: 0
    betas: [0.9, 0.99]
  scheduler:
    type: MultiStepLR
    milestones: [50000, 100000, 150000]
    gamma: 0.5
  pdm:
    optim_deg: true
    optim_sr: true
    d_ratio: 1
    buffer_size: 0
    gray_dis: false
    max_grad_norm: 50
  losses:
    # 像素保真：保证整体结构与卫星影像一致
    - name: sr_pix_sr
      type: l1loss
      loss_weight: 1.0
    - name: noise_mean
      type: mseloss
      loss_weight: 1.0
    # 提高 GAN 权重，让输出更接近航拍域纹理（允许一定幻觉）
    - name: sr_adv
      type: ganloss
      gan_type: lsgan
      real_label_val: 1.0
      fake_label_val: 0.0
      loss_weight: 0.1
    # 提高感知损失权重，鼓励生成更丰富的高频细节
    - name: sr_percep
      type: perceptualloss
      criterion: l1
      loss_weight: 0.5
    - name: lr_adv
      type: ganloss
      gan_type: lsgan
      real_label_val: 1.0
      fake_label_val: 0.0
      loss_weight: 0.05
    - name: lr_gauss
      type: gaussguidedloss
      ksize: 21
      sigma: 10.5
      loss_weight: 0.0
    - name: sr_pix_trans
      type: l1loss
      loss_weight: 0.0
    - name: lr_quant
      type: l1loss
      loss_weight: 0.0

val:
  val_enabled: false
  val_freq: 5000
  save_img: false
  tile_size: 0
  tile_overlap: 8
  metrics_enabled: false
  pdm:
    crop_test: false
    crop_size: 0

logger:
  print_freq: 100
  save_checkpoint_freq: 5000
  save_checkpoint_format: safetensors
  use_tb_logger: true
